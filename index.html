<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin-Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <div class="container">
        <div class="sidebar">
            <div class="title">
                <a href="index.html"><img src=assets/favicons/icons8-dashboard-48.png class="title-imge"></a>
                <h2 class="sidebar-text title">Dashboard</h2>
            </div>
            <div class="links">
                <div class="link home-container">
                    <img src=assets/favicons/home-svgrepo-com.svg class="favicon home">
                    <a href="#home" class="sidebar-text link home">Home</a>
                </div>
                <div class="link profile-container">
                    <img src=assets/favicons/profile-image-minus-round-1329-svgrepo-com.svg class="favicon profile">
                    <a href="#profile" class="sidebar-text link profile">Profile</a>
                </div>
                <div class="link messages-container">
                    <img src="assets/favicons/messages-svgrepo-com.svg" class="favicon messages">
                    <a href="#messages" class="sidebar-text link messages">Messages</a>
                </div>
                <div class="link history-container">
                    <img src="assets/favicons/history-svgrepo-com.svg" class="favicon history">
                    <a href="#history" class="sidebar-text link history">History</a>
                </div>
                <div class="link tasks-container">
                    <img src="assets/favicons/paper-fold-svgrepo-com.svg" class="favicon tasks">
                    <a href="#tasks" class="sidebar-text link tasks">Tasks</a>
                </div>
                <div class="link community-container">
                    <img src="assets/favicons/community-group-leader-2-svgrepo-com.svg" class="favicon community">
                    <a href="#community" class="sidebar-text link community">Communities</a>
                </div>
            </div>
            <div class="preferences">
                <div class="link settings-container">
                    <img src="assets/favicons/settings-svgrepo-com.svg" class="favicon settings">
                    <a href="#settings" class="sidebar-text link settings">Settings</a>
                </div>
                 <div class="link support-container">
                    <img src="assets/favicons/help-octagon-svgrepo-com.svg" class="favicon support">
                    <a href="#support" class="sidebar-text link support">Support</a>
                </div>
                <div class="link privacy-container">
                    <img src="assets/favicons/shield-svgrepo-com.svg" class="favicon privacy">
                    <a href="#privacy" class="sidebar-text link privacy">Privacy</a>
                </div>
            </div>
       </div>
        <div class="right-container">
            <div class="top">
                <div class="row-top">
                    <div class="searches">
                        <img src="assets/favicons/search-alt-1-svgrepo-com.svg" class="favicon search transition">
                        <input id="search" type="text" placeholder="Search...">
                    </div>
                    <div class="everything-else">
                        <img src="assets/favicons/notification-bell-1397-svgrepo-com.svg" class="favicon notification transition">
                        <img src="assets/images/kitten.jpg" class="image prof small transition">
                        <p class="top-text">Mr. Furball</p>
                    </div>
                </div>
                <div class="row-bottom">
                    <div class="hello">
                        <img src="assets/images/kitten.jpg" class="image prof medium">
                        <div class="hi-there">
                            <p class="hithere">Hi there,</p>
                            <p class="furball">Mr. Furball (@furrymenace)</p>
                        </div>
                    </div>
                    <div class="buttons">
                        <button class="btn new"><img src=assets/favicons/new-indicator-svgrepo-com.svg class="favicon button new">Post</button>
                        <button class="btn upload"><img src="assets/favicons/upload-svgrepo-com.svg" class="favicon button new">Upload Media</button>
                        <button class="btn share"><img src="assets/favicons/send-alt-1-svgrepo-com.svg" class="favicon button send">Share</button>
                    </div>
                </div>
            </div>
            <div class="bottom">
                <div class="left-container">
                    <h3 class="your-posts title">Your Posts</h3>
                    <div class="grid">
                        <div class=""
                    </div>
                </div>
                <div class="right-container">
                    <div class="announcements">
                        <h3 class="announcements title">Announcements</h3>
                        <div class="announcements-box">

                        </div>
                    </div>
                    <div class="trending">
                        <h3 class="trending title">Trending</h3>
                        <div class="trending-box">

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="assets/scripts/script.js"></script>
</html>
